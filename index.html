<!DOCTYPE html> <!-- declara o tipo de documento HTML5 -->
<html lang="pt-BR"> <!-- idioma português brasileiro -->
<head>
    <meta charset="UTF-8"> <!-- codificação UTF-8 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- viewport responsivo -->
    <meta name="description" content="Selecione o perfil para começar a assistir na Netflix"> <!-- descrição para SEO -->
    <title>Netflix</title> <!-- título da página -->
    <link rel="stylesheet" href="./style.css"> <!-- link para o CSS -->
</head>
<body>
    <main> <!-- conteúdo principal -->
        <h1>Quem está assistindo?</h1> <!-- título principal -->
        <p class="profile-subtitle">Escolha seu perfil para continuar</p>
        <button id="theme-toggle" class="theme-toggle" aria-label="Alternar tema"> <!-- botão para alternar tema -->
            <span class="theme-icon">🌙</span> <!-- ícone do tema -->
        </button>
        <section class="profiles"> <!-- seção dos perfis -->
            <a href="intro.html?profile=jennifer" class="profile-link"> <!-- link para perfil Jennifer -->
                <article class="profile"> <!-- artigo do perfil -->
                    <figure> <!-- figura com imagem -->
                        <img src="./assets/perfil-jennifer.png" alt="Perfil de Jennifer"> <!-- imagem do perfil -->
                    </figure>
                    <figcaption>Jennifer</figcaption> <!-- legenda do perfil -->
                </article>
            </a>
            <a href="intro.html?profile=gurgel" class="profile-link"> <!-- link para perfil Gurgel -->
                <article class="profile">
                    <figure>
                        <img src="./assets/batman-gurgel.jpg" alt="Perfil de Gurgel"> <!-- imagem do perfil -->
                    </figure>
                    <figcaption>Gurgel</figcaption> <!-- legenda do perfil -->
                </article>
            </a>
            <a href="intro.html?profile=mota" class="profile-link"> <!-- link para perfil Mota -->
                <article class="profile">
                    <figure>
                        <img src="./assets/emanuel-luffy.jpg" alt="Perfil de Mota"> <!-- imagem do perfil -->
                    </figure>
                    <figcaption>Mota</figcaption> <!-- legenda do perfil -->
                </article>
            </a>
        </section>
    </main>
    <script src="./script.js"></script> <!-- script JavaScript -->
</body>
</html>
