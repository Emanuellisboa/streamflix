<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Intro</title>

  <style>
    body {
      margin: 0;
      background: black;
      overflow: hidden;
    }

    video {
      width: 100%;
      height: 100vh;
      object-fit: cover;
    }
  </style>
</head>

<body>

  <video id="introVideo" autoplay>
    <source src="./assets/videos/Netflix New Logo Animation 2019(720P_HD).mp4" type="video/mp4">
  </video>

  <script>
    const video = document.getElementById("introVideo");

    // tenta rodar com som
    const interagiu = localStorage.getItem("interagiu");

    if (interagiu) {
      video.muted = false;

      video.play().catch(() => {
        // se navegador bloquear som → volta pro mudo
        video.muted = true;
        video.play();
      });
    }

    // quando terminar → catálogo
    video.addEventListener("ended", () => {
      window.location.href = "./catalogo/catalogo.html";
    });

    // segurança (caso evento falhe)
    setTimeout(() => {
      window.location.href = "./catalogo/catalogo.html";
    }, 6000);
  </script>

</body>
</html>
